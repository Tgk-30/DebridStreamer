name: Bug report
description: Report a reproducible app, server, playback, or update bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: mode
    attributes:
      label: Run mode
      options:
        - Desktop app
        - Desktop Host Mode
        - Docker / Server Mode
        - PWA / browser client
        - Local development
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0, commit SHA, or branch
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact clicks, URLs used, server mode, and profile role.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove API keys, tokens, cookies, CSRF tokens, and raw stream URLs.
      render: text
