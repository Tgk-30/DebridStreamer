name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # VLCKit.xcframework is tracked via Git LFS; the build needs the real binary.
          lfs: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pin to whatever stable Xcode the runner image ships (16.0 was removed).
          xcode-version: "latest-stable"

      - name: Build
        run: swift build

      - name: Test
        run: swift test
