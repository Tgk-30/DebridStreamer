name: clean-install

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag whose draft assets should be installed
        required: true
        type: string
      include_windows:
        description: Verify signed Windows installers for this release
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag whose assets should be installed
        required: true
        type: string
      include_windows:
        description: Verify signed Windows installers for this release
        required: false
        default: false
        type: boolean

# Draft releases are visible only to tokens with push access. The release stays
# draft until this workflow has installed and verified every platform package.
permissions:
  contents: write

jobs:
  manifest:
    name: Release manifest and asset inventory
    runs-on: ubuntu-24.04
    steps:
      - name: Download updater manifest and inventory assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern latest.json \
            --dir "$RUNNER_TEMP/release-assets"
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name' \
            | sort > "$RUNNER_TEMP/release-assets/names.txt"

      - name: Verify updater channels and signed assets
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          INCLUDE_WINDOWS: ${{ inputs.include_windows }}
          LATEST_JSON: ${{ runner.temp }}/release-assets/latest.json
          ASSET_NAMES: ${{ runner.temp }}/release-assets/names.txt
        run: |
          set -euo pipefail
          expected_version="${RELEASE_TAG#v}"
          expected_version="${expected_version%-web}"
          node <<'NODE'
          const { readFileSync } = require("node:fs");
          const manifest = JSON.parse(readFileSync(process.env.LATEST_JSON, "utf8"));
          const expectedVersion = process.env.RELEASE_TAG.replace(/^v/, "").replace(/-web$/, "");
          if (manifest.version !== expectedVersion) {
            throw new Error(`latest.json version ${manifest.version} does not match ${expectedVersion}`);
          }
          const platforms = manifest.platforms ?? {};
          const required = [
            "darwin-aarch64",
            "darwin-aarch64-app",
            "darwin-x86_64",
            "darwin-x86_64-app",
            "linux-x86_64",
            "linux-x86_64-appimage",
            "linux-x86_64-deb",
          ];
          for (const key of required) {
            const entry = platforms[key];
            if (!entry?.url?.includes(`/releases/download/${process.env.RELEASE_TAG}/`)) {
              throw new Error(`latest.json is missing a release-scoped URL for ${key}`);
            }
            if (typeof entry.signature !== "string" || entry.signature.length < 40) {
              throw new Error(`latest.json is missing an updater signature for ${key}`);
            }
          }
          const windows = Object.keys(platforms).filter((key) => key.startsWith("windows-"));
          if (process.env.INCLUDE_WINDOWS === "true") {
            for (const key of ["windows-x86_64", "windows-x86_64-msi", "windows-x86_64-nsis"]) {
              if (!windows.includes(key)) throw new Error(`latest.json is missing ${key}`);
            }
          } else if (windows.length > 0) {
            throw new Error(`Held Windows channel leaked into latest.json: ${windows.join(", ")}`);
          }
          NODE

          for asset in \
            "YAWF.Stream_${expected_version}_aarch64.dmg" \
            "YAWF.Stream_${expected_version}_x64.dmg" \
            "YAWF.Stream_${expected_version}_amd64.AppImage" \
            "YAWF.Stream_${expected_version}_amd64.AppImage.sig" \
            "YAWF.Stream_${expected_version}_amd64.deb" \
            "YAWF.Stream_${expected_version}_amd64.deb.sig" \
            "YAWF.Stream_Android.TV_${expected_version}.apk" \
            "YAWF.Stream_aarch64.app.tar.gz" \
            "YAWF.Stream_aarch64.app.tar.gz.sig" \
            "YAWF.Stream_x64.app.tar.gz" \
            "YAWF.Stream_x64.app.tar.gz.sig" \
            "latest.json"; do
            grep -Fxq "$asset" "$ASSET_NAMES" || {
              echo "Required release asset is missing: $asset" >&2
              exit 1
            }
          done

          if [ "$INCLUDE_WINDOWS" = "true" ]; then
            for asset in \
              "YAWF.Stream_${expected_version}_x64_en-US.msi" \
              "YAWF.Stream_${expected_version}_x64_en-US.msi.sig" \
              "YAWF.Stream_${expected_version}_x64-setup.exe" \
              "YAWF.Stream_${expected_version}_x64-setup.exe.sig"; do
              grep -Fxq "$asset" "$ASSET_NAMES" || {
                echo "Required Windows asset is missing: $asset" >&2
                exit 1
              }
            done
          elif grep -Eiq '\.(msi|exe)(\.sig)?$|windows' "$ASSET_NAMES"; then
            echo "Held Windows channel leaked an asset into the draft release" >&2
            grep -Ei '\.(msi|exe)(\.sig)?$|windows' "$ASSET_NAMES" >&2
            exit 1
          fi

  android-tv:
    name: Android TV package verification
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;36.0.0"

      - name: Download and verify APK
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          version="${version%-web}"
          asset="YAWF.Stream_Android.TV_${version}.apk"
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --dir "$RUNNER_TEMP/release-assets"
          apk="$RUNNER_TEMP/release-assets/$asset"
          test -f "$apk"
          apksigner verify "$apk"
          test "$(apkanalyzer manifest application-id "$apk")" = "com.yawf.stream.tv"
          test "$(apkanalyzer manifest version-name "$apk")" = "$version"
          manifest="$RUNNER_TEMP/android-tv-manifest.xml"
          apkanalyzer manifest print "$apk" > "$manifest"
          EXPECTED_VERSION="$version" MANIFEST="$manifest" python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          android = "{http://schemas.android.com/apk/res/android}"
          root = ET.parse(os.environ["MANIFEST"]).getroot()
          assert root.attrib[f"{android}versionName"] == os.environ["EXPECTED_VERSION"]
          features = {
              node.attrib[f"{android}name"]: node.attrib.get(f"{android}required")
              for node in root.findall("uses-feature")
          }
          assert features["android.software.leanback"] == "true"
          assert features["android.hardware.touchscreen"] == "false"
          application = root.find("application")
          assert application is not None and application.attrib.get(f"{android}banner")
          categories = {
              node.attrib.get(f"{android}name")
              for node in root.findall(".//category")
          }
          assert "android.intent.category.LEANBACK_LAUNCHER" in categories
          PY

  macos:
    name: macOS ${{ matrix.arch }} clean install
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            asset_arch: aarch64
          - runner: macos-15-intel
            arch: x86_64
            asset_arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download DMG
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "YAWF.Stream_*_${ASSET_ARCH}.dmg" \
            --dir "$RUNNER_TEMP/release-assets"
          test "$(find "$RUNNER_TEMP/release-assets" -name '*.dmg' | wc -l | tr -d ' ')" = "1"

      - name: Install and verify DMG
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find "$RUNNER_TEMP/release-assets" -name '*.dmg' -print -quit)"
          mount="$RUNNER_TEMP/yawf-dmg"
          install_root="$RUNNER_TEMP/Applications"
          mkdir -p "$mount" "$install_root"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount" "$dmg"
          cleanup() { hdiutil detach "$mount" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          source_app="$(find "$mount" -maxdepth 2 -name 'YAWF Stream.app' -print -quit)"
          test -n "$source_app"
          ditto "$source_app" "$install_root/YAWF Stream.app"
          app="$install_root/YAWF Stream.app"
          exe="$app/Contents/MacOS/debridstreamer"

          codesign --verify --deep --strict --verbose=2 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$dmg"
          test "$(uname -m)" = "${{ matrix.arch }}"
          test -x "$exe"
          test -n "$(find "$app/Contents/Frameworks" -name 'libmpv*.dylib' -print -quit)"
          test -z "$(otool -L "$exe" | grep -E '/opt/homebrew|/usr/local' || true)"
          if find "$app/Contents/Frameworks" -name '*.dylib' -print0 | \
            xargs -0 otool -L | grep -E '/opt/homebrew|/usr/local'; then
            echo "Bundled player dependency still points at a build-machine path" >&2
            exit 1
          fi

          node scripts/smoke_tauri_server_bundle.mjs "$app"

          clean_home="$RUNNER_TEMP/clean-home"
          mkdir -p "$clean_home"
          HOME="$clean_home" "$exe" >"$RUNNER_TEMP/yawf-launch.log" 2>&1 &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/yawf-launch.log"
            echo "Installed app exited during first launch" >&2
            exit 1
          fi
          kill "$pid"
          wait "$pid" 2>/dev/null || true
          echo "ok   Signed DMG installed and launched with a clean profile"

  windows:
    name: Windows ${{ matrix.label }} clean install
    if: inputs.include_windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: MSI
            kind: msi
            pattern: YAWF.Stream_*_x64_en-US.msi
          - label: NSIS
            kind: nsis
            pattern: YAWF.Stream_*_x64-setup.exe
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          INSTALLER_PATTERN: ${{ matrix.pattern }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\release-assets" | Out-Null
          gh release download $env:RELEASE_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --pattern $env:INSTALLER_PATTERN `
            --dir "$env:RUNNER_TEMP\release-assets"
          $assets = @(Get-ChildItem "$env:RUNNER_TEMP\release-assets" -File)
          if ($assets.Count -ne 1) {
            throw "Expected one Windows installer, found $($assets.Count)"
          }

      - name: Install and verify Windows package
        shell: pwsh
        env:
          INSTALLER_KIND: ${{ matrix.kind }}
        run: |
          $ErrorActionPreference = "Stop"
          $installer = (Get-ChildItem "$env:RUNNER_TEMP\release-assets" -File | Select-Object -First 1).FullName
          $installerSignature = Get-AuthenticodeSignature $installer
          Write-Host "$env:INSTALLER_KIND Authenticode status: $($installerSignature.Status)"
          if ($installerSignature.Status -ne "Valid") {
            throw "Windows $env:INSTALLER_KIND installer Authenticode signature is not valid: $($installerSignature.Status)"
          }

          if ($env:INSTALLER_KIND -eq "msi") {
            $install = Start-Process msiexec.exe `
              -ArgumentList @('/i', "`"$installer`"", '/qn', '/norestart') `
              -Wait -PassThru
            $acceptedExitCodes = @(0, 3010)
          } else {
            $install = Start-Process $installer -ArgumentList @('/S') -Wait -PassThru
            $acceptedExitCodes = @(0)
          }
          if ($install.ExitCode -notin $acceptedExitCodes) {
            throw "Windows $env:INSTALLER_KIND installation failed with exit code $($install.ExitCode)"
          }

          $roots = @($env:ProgramFiles, ${env:ProgramFiles(x86)}, $env:LOCALAPPDATA) |
            Where-Object { $_ -and (Test-Path $_) }
          $serverEntry = Get-ChildItem -Path $roots -Filter index.cjs -File -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'YAWF Stream.*resources[\\/]server[\\/]index\.cjs$' } |
            Select-Object -First 1
          if (-not $serverEntry) { throw "Installed server resources were not found" }
          $serverDir = Split-Path $serverEntry.FullName -Parent
          $resourcesDir = Split-Path $serverDir -Parent
          $appRoot = Split-Path $resourcesDir -Parent
          node scripts/smoke_tauri_server_bundle.mjs $appRoot

          $exe = Get-ChildItem -Path $appRoot -Filter debridstreamer.exe -File -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $exe) { throw "Installed desktop executable was not found" }
          $appSignature = Get-AuthenticodeSignature $exe.FullName
          Write-Host "App Authenticode status: $($appSignature.Status)"
          if ($appSignature.Status -ne "Valid") {
            throw "Installed app Authenticode signature is not valid: $($appSignature.Status)"
          }
          $mpvDll = Get-ChildItem -Path $appRoot -Filter libmpv-2.dll -File -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $mpvDll) {
            throw "Bundled libmpv-2.dll was not installed"
          }

          $cleanProfile = "$env:RUNNER_TEMP\clean-profile"
          $env:APPDATA = "$cleanProfile\Roaming"
          $env:LOCALAPPDATA = "$cleanProfile\Local"
          New-Item -ItemType Directory -Force -Path $env:APPDATA, $env:LOCALAPPDATA | Out-Null
          $process = Start-Process $exe.FullName -PassThru
          Start-Sleep -Seconds 10
          $process.Refresh()
          if ($process.HasExited) { throw "Installed app exited during first launch" }
          Stop-Process -Id $process.Id -Force
          Write-Host "ok   $env:INSTALLER_KIND installed and launched with a clean profile"

  linux:
    name: Linux AppImage and deb clean install
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download Linux packages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-assets"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'YAWF.Stream_*_amd64.AppImage' \
            --pattern 'YAWF.Stream_*_amd64.deb' \
            --dir "$RUNNER_TEMP/release-assets"
          test "$(find "$RUNNER_TEMP/release-assets" -name '*.AppImage' | wc -l | tr -d ' ')" = "1"
          test "$(find "$RUNNER_TEMP/release-assets" -name '*.deb' | wc -l | tr -d ' ')" = "1"

      - name: Install runtime prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0 \
            libayatana-appindicator3-1 \
            libjack-jackd2-0 \
            librsvg2-2

      - name: Verify AppImage on a clean profile
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find "$RUNNER_TEMP/release-assets" -name '*.AppImage' -print -quit)"
          chmod +x "$appimage"
          extract="$RUNNER_TEMP/appimage-extract"
          mkdir -p "$extract"
          (
            cd "$extract"
            "$appimage" --appimage-extract >/dev/null
          )
          extracted_root="$extract/squashfs-root"
          test -n "$(find "$extracted_root" -name 'libmpv.so*' -print -quit)"
          entry="$(find "$extracted_root" -path '*/resources/server/index.cjs' -print -quit)"
          test -n "$entry"
          server_dir="$(dirname "$entry")"
          resources_dir="$(dirname "$server_dir")"
          app_root="$(dirname "$resources_dir")"
          node scripts/smoke_tauri_server_bundle.mjs "$app_root"

          profile="$RUNNER_TEMP/appimage-profile"
          mkdir -p "$profile/config" "$profile/data" "$profile/cache"
          setsid env \
            HOME="$profile" \
            XDG_CONFIG_HOME="$profile/config" \
            XDG_DATA_HOME="$profile/data" \
            XDG_CACHE_HOME="$profile/cache" \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            xvfb-run -a "$appimage" >"$RUNNER_TEMP/appimage-launch.log" 2>&1 &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/appimage-launch.log"
            echo "AppImage exited during first launch" >&2
            exit 1
          fi
          kill -- -"$pid"
          wait "$pid" 2>/dev/null || true
          echo "ok   AppImage launched with bundled libmpv and a clean profile"

      - name: Install and verify deb
        shell: bash
        run: |
          set -euo pipefail
          deb="$(find "$RUNNER_TEMP/release-assets" -name '*.deb' -print -quit)"
          sudo apt-get install -y "$deb"
          package="$(dpkg-deb -f "$deb" Package)"
          entry="$(dpkg -L "$package" | grep '/resources/server/index.cjs$' | head -1)"
          test -n "$entry"
          server_dir="$(dirname "$entry")"
          resources_dir="$(dirname "$server_dir")"
          app_root="$(dirname "$resources_dir")"
          node scripts/smoke_tauri_server_bundle.mjs "$app_root"

          exe="$(dpkg -L "$package" | grep -E '/(debridstreamer|yawf-stream)$' | head -1)"
          test -x "$exe"
          profile="$RUNNER_TEMP/deb-profile"
          mkdir -p "$profile/config" "$profile/data" "$profile/cache"
          setsid env \
            HOME="$profile" \
            XDG_CONFIG_HOME="$profile/config" \
            XDG_DATA_HOME="$profile/data" \
            XDG_CACHE_HOME="$profile/cache" \
            xvfb-run -a "$exe" >"$RUNNER_TEMP/deb-launch.log" 2>&1 &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/deb-launch.log"
            echo "Installed deb app exited during first launch" >&2
            exit 1
          fi
          kill -- -"$pid"
          wait "$pid" 2>/dev/null || true
          echo "ok   deb installed and launched with a clean profile"

  server-deb:
    name: Server deb clean install (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Node 24 and FFmpeg
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs ffmpeg
          node --version
          ffmpeg -version | head -1

      - name: Download server package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          version="${version%-web}"
          asset="debridstreamer-server_${version}_all.deb"
          mkdir -p "$RUNNER_TEMP/release-assets"
          for attempt in $(seq 1 30); do
            rm -f "$RUNNER_TEMP/release-assets/$asset"
            if gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$asset" \
              --dir "$RUNNER_TEMP/release-assets"; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Server package $asset was not attached to the draft release" >&2
              exit 1
            fi
            sleep 10
          done
          test -f "$RUNNER_TEMP/release-assets/$asset"
          echo "SERVER_DEB=$RUNNER_TEMP/release-assets/$asset" >> "$GITHUB_ENV"

      - name: Install and boot server package
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          sudo apt-get install -y "$SERVER_DEB"
          expected_version="${RELEASE_TAG#v}"
          expected_version="${expected_version%-web}"
          test "$(dpkg-deb -f "$SERVER_DEB" Architecture)" = "all"
          test "$(dpkg-deb -f "$SERVER_DEB" Version)" = "$expected_version"
          test -f /opt/debridstreamer/server/dist/index.cjs
          test -f /opt/debridstreamer/web-dist/index.html
          test -f /lib/systemd/system/debridstreamer.service

          data_dir="$RUNNER_TEMP/server-data"
          mkdir -p "$data_dir"
          port="$(node -e "const s=require('net').createServer();s.listen(0,'127.0.0.1',()=>{console.log(s.address().port);s.close()})")"
          env \
            NODE_ENV=production \
            HOST=127.0.0.1 \
            PORT="$port" \
            DS_SERVER_SECRET_KEY="$(openssl rand -base64 32)" \
            DS_SERVER_DATA_DIR="$data_dir" \
            DS_SERVER_DB_PATH="$data_dir/debridstreamer.sqlite" \
            DS_SERVER_COOKIE_SECURE=false \
            DS_SERVER_COOKIE_SAMESITE=lax \
            DS_WEB_DIST=/opt/debridstreamer/web-dist \
            node /opt/debridstreamer/server/dist/index.cjs \
            >"$RUNNER_TEMP/server-deb.log" 2>&1 &
          pid=$!
          cleanup() {
            kill "$pid" >/dev/null 2>&1 || true
            wait "$pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 80); do
            if curl --fail --silent "http://127.0.0.1:${port}/api/health" \
              | grep -q '"ok":true'; then
              break
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$RUNNER_TEMP/server-deb.log"
              echo "Installed server exited before becoming healthy" >&2
              exit 1
            fi
            if [ "$attempt" -eq 80 ]; then
              cat "$RUNNER_TEMP/server-deb.log"
              echo "Installed server did not become healthy" >&2
              exit 1
            fi
            sleep 0.25
          done
          curl --fail --silent "http://127.0.0.1:${port}/" -o "$RUNNER_TEMP/server-home.html"
          grep -qi '<html\|<!doctype html' "$RUNNER_TEMP/server-home.html"
          echo "ok   Server deb installed and served health + HTML"
