name: cloudflare-site

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "website-app/**"
      - "web/public/icons/**"
      - "scripts/check_website_download_logic.mjs"
      - "scripts/check_website_static.mjs"
      - "scripts/check_website_path_mount.mjs"
      - "scripts/check_website_app.mjs"
      - "scripts/deploy_website_cloudflare.mjs"
      - "scripts/public_repo_preflight.mjs"
      - ".github/workflows/cloudflare-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Public repo preflight
        run: node scripts/public_repo_preflight.mjs

      - name: Build YAWF Stream website
        working-directory: website-app
        run: npm ci && npm run lint && npm run build

      - name: YAWF Stream website QA
        run: node scripts/check_website_app.mjs

      - name: Website download logic
        run: node scripts/check_website_download_logic.mjs

      - name: Website static QA
        run: node scripts/check_website_static.mjs

      - name: Website mounted-path QA
        run: node scripts/check_website_path_mount.mjs

      - name: Validate Cloudflare token secret
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required for tgk30.com/debridstreamer deployment"
            exit 1
          fi

      - name: Deploy tgk30.com/debridstreamer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: node scripts/deploy_website_cloudflare.mjs
