name: desktop-build

# Cross-platform desktop package gate for the in-window player. Compiles and
# bundles the Tauri app for Windows and Linux for relevant pull requests and main
# pushes. It does not sign or release anything. The workflow uploads installers
# so they can be inspected before a public release. macOS ships through
# web-release.yml because it needs Developer ID signing and libmpv relocation.

on:
  push:
    branches:
      - main
    paths:
      - "web/src-tauri/**"
      - "web/src/**"
      - "web/package.json"
      - "web/package-lock.json"
      - "server/**"
      - "scripts/**"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/src-tauri/**"
      - "web/src/**"
      - "web/package.json"
      - "web/package-lock.json"
      - "server/**"
      - "scripts/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same branch supersedes an in-flight build.
concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os: windows
            node_runtime: win-x64
            bundles: msi,nsis
            artifact_glob: |
              web/src-tauri/target/release/bundle/msi/*.msi
              web/src-tauri/target/release/bundle/nsis/*.exe
          # ubuntu-24.04 ships libmpv.so.2 (mpv 0.37) - the 2.x client API the
          # libmpv2 crate needs. web-release.yml still builds the .deb on 22.04
          # (broad glibc), so this validates the player surface, not the shipping
          # deb's compat baseline.
          - platform: ubuntu-24.04
            os: linux
            node_runtime: linux-x64
            # AppImage too: a portable build for non-Debian distros, and it proves
            # Tauri's linuxdeploy bundles libmpv.so.2 into the image (de-risks the
            # eventual web-release AppImage).
            bundles: deb,appimage
            artifact_glob: |
              web/src-tauri/target/release/bundle/deb/*.deb
              web/src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> target"

      # ── Linux: Tauri (webkit2gtk) system deps + libmpv dev/runtime ──────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            libgtk-3-dev \
            libmpv-dev
          echo "libmpv version:" && pkg-config --modversion mpv || true
          ls -l /usr/lib/x86_64-linux-gnu/libmpv.so* || true

      # ── Windows: MSVC env (for lib.exe) + libmpv import lib + runtime DLL ────
      - name: Set up MSVC (lib.exe on PATH)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Provision libmpv (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          # Latest shinchiro mpv-dev (ships libmpv-2.dll + import lib + headers).
          $rel = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-2*.7z' } | Select-Object -First 1
          if (-not $asset) { throw "no mpv-dev-x86_64 asset in the latest release" }
          Write-Host "Fetching $($asset.name)"
          curl.exe -L -o mpv-dev.7z $asset.browser_download_url
          $dest = "$env:RUNNER_TEMP\mpv"
          7z x mpv-dev.7z -o"$dest" | Out-Null
          Write-Host "--- mpv-dev archive contents ---"
          Get-ChildItem -Path $dest -Recurse -File | ForEach-Object { $_.FullName.Substring($dest.Length) }
          # Find the runtime DLL first - everything is derived from it.
          $dll = Get-ChildItem -Path $dest -Recurse -Include 'libmpv-2.dll','mpv-2.dll','libmpv-1.dll' | Select-Object -First 1
          if (-not $dll) { throw "libmpv-*.dll not found in mpv-dev archive" }
          Write-Host "Found runtime DLL: $($dll.FullName)"
          # libmpv2-sys emits `-l mpv`, so the MSVC linker needs mpv.lib. Prefer a
          # shipped mpv.def; otherwise synthesise one from the DLL export table via
          # dumpbin (robust to whatever the archive layout ships).
          $def = Get-ChildItem -Path $dest -Recurse -Filter '*.def' | Select-Object -First 1
          $defPath = if ($def) { $def.FullName } else { "$dest\mpv.def" }
          if (-not $def) {
            Write-Host "No .def shipped; generating from $($dll.Name) exports"
            $exports = dumpbin /nologo /exports $dll.FullName
            $names = $exports |
              Select-String -Pattern '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value } |
              # Keep only real C identifiers - drops ordinal-only '(noname)' rows and
              # any stray token that would make an invalid .def and fail lib.exe.
              Where-Object { $_ -match '^[A-Za-z_][A-Za-z0-9_]*$' }
            if (-not $names) { throw "no exports parsed from $($dll.Name)" }
            Write-Host "Parsed $($names.Count) exports (e.g. $($names[0]))"
            # The LIBRARY line makes the import records reference libmpv-2.dll (the
            # real runtime DLL) - without it, lib.exe names the DLL after the .def
            # basename and the exe would look for the wrong module at load/delay-load.
            @("LIBRARY libmpv-2", "EXPORTS") + $names | Set-Content -Encoding ascii $defPath
          }
          lib /def:"$defPath" /out:"$dest\mpv.lib" /machine:x64
          if (-not (Test-Path "$dest\mpv.lib")) { throw "lib.exe did not produce mpv.lib" }
          "MPV_LIB_DIR=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Ship libmpv-2.dll with the app (bundled via `resources: lib/**/*`).
          New-Item -ItemType Directory -Force -Path web\src-tauri\lib | Out-Null
          Copy-Item $dll.FullName web\src-tauri\lib\libmpv-2.dll -Force
          Write-Host "MPV_LIB_DIR=$dest ; bundled $($dll.Name) as libmpv-2.dll"

      # ── Frontend + server bundle so `resources/server/**` exists for bundling ─
      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build server bundle
        working-directory: server
        run: npm run build

      - name: Build hosted PWA assets
        working-directory: web
        run: npm run build

      - name: Prepare desktop server resources
        run: node scripts/prepare_tauri_server_resources.mjs

      - name: Bundle Node runtime
        run: node scripts/download_tauri_node_runtime.mjs ${{ matrix.node_runtime }}

      - name: Smoke desktop server resources
        run: node scripts/smoke_tauri_server_bundle.mjs web/src-tauri/resources/server

      # ── Build the desktop bundle (no updater signing) ────────────────────────
      - name: Tauri build
        working-directory: web
        # APPIMAGE_EXTRACT_AND_RUN lets appimagetool/linuxdeploy run without FUSE
        # (ubuntu-24.04 has no libfuse2 by default); harmless on Windows.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run tauri -- build --bundles ${{ matrix.bundles }} --config src-tauri/tauri.ci.conf.json

      - name: Verify Windows bundles and clean-install MSI
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $msiFiles = @(Get-ChildItem web\src-tauri\target\release\bundle\msi -Filter *.msi)
          $nsisFiles = @(Get-ChildItem web\src-tauri\target\release\bundle\nsis -Filter *.exe)
          if ($msiFiles.Count -ne 1) { throw "Expected one MSI, found $($msiFiles.Count)" }
          if ($nsisFiles.Count -ne 1) { throw "Expected one NSIS installer, found $($nsisFiles.Count)" }

          $install = Start-Process msiexec.exe `
            -ArgumentList @('/i', "`"$($msiFiles[0].FullName)`"", '/qn', '/norestart') `
            -Wait -PassThru
          if ($install.ExitCode -notin @(0, 3010)) {
            throw "MSI installation failed with exit code $($install.ExitCode)"
          }

          $roots = @($env:ProgramFiles, ${env:ProgramFiles(x86)}, $env:LOCALAPPDATA) |
            Where-Object { $_ -and (Test-Path $_) }
          $serverEntry = Get-ChildItem -Path $roots -Filter index.cjs -File -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'YAWF Stream.*resources[\\/]server[\\/]index\.cjs$' } |
            Select-Object -First 1
          if (-not $serverEntry) { throw "Installed server resources were not found" }
          $serverDir = Split-Path $serverEntry.FullName -Parent
          $resourcesDir = Split-Path $serverDir -Parent
          $appRoot = Split-Path $resourcesDir -Parent
          node scripts/smoke_tauri_server_bundle.mjs $appRoot

          $exe = Get-ChildItem -Path $appRoot -Filter debridstreamer.exe -File -Recurse |
            Select-Object -First 1
          if (-not $exe) { throw "Installed desktop executable was not found" }
          $mpvDll = Get-ChildItem -Path $appRoot -Filter libmpv-2.dll -File -Recurse |
            Select-Object -First 1
          if (-not $mpvDll) { throw "Bundled libmpv-2.dll was not installed" }

          $cleanProfile = "$env:RUNNER_TEMP\desktop-build-profile"
          $env:APPDATA = "$cleanProfile\Roaming"
          $env:LOCALAPPDATA = "$cleanProfile\Local"
          New-Item -ItemType Directory -Force -Path $env:APPDATA, $env:LOCALAPPDATA | Out-Null
          $process = Start-Process $exe.FullName -PassThru
          Start-Sleep -Seconds 10
          $process.Refresh()
          if ($process.HasExited) { throw "Installed app exited during first launch" }
          Stop-Process -Id $process.Id -Force
          Write-Host "ok   MSI and NSIS built; MSI installed and launched with bundled libmpv"

      - name: Verify Linux packages on clean profiles
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find "$GITHUB_WORKSPACE/web/src-tauri/target/release/bundle/appimage" -name '*.AppImage' -print -quit)"
          deb="$(find "$GITHUB_WORKSPACE/web/src-tauri/target/release/bundle/deb" -name '*.deb' -print -quit)"
          test -n "$appimage"
          test -n "$deb"
          chmod +x "$appimage"

          extract="$RUNNER_TEMP/appimage-extract"
          mkdir -p "$extract"
          (
            cd "$extract"
            "$appimage" --appimage-extract >/dev/null
          )
          extracted_root="$extract/squashfs-root"
          test -n "$(find "$extracted_root" -name 'libmpv.so*' -print -quit)"
          entry="$(find "$extracted_root" -path '*/resources/server/index.cjs' -print -quit)"
          test -n "$entry"
          server_dir="$(dirname "$entry")"
          resources_dir="$(dirname "$server_dir")"
          app_root="$(dirname "$resources_dir")"
          node scripts/smoke_tauri_server_bundle.mjs "$app_root"

          profile="$RUNNER_TEMP/appimage-profile"
          mkdir -p "$profile/config" "$profile/data" "$profile/cache"
          setsid env \
            HOME="$profile" \
            XDG_CONFIG_HOME="$profile/config" \
            XDG_DATA_HOME="$profile/data" \
            XDG_CACHE_HOME="$profile/cache" \
            APPIMAGE_EXTRACT_AND_RUN=1 \
            xvfb-run -a "$appimage" >"$RUNNER_TEMP/appimage-launch.log" 2>&1 &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/appimage-launch.log"
            echo "AppImage exited during first launch" >&2
            exit 1
          fi
          kill -- -"$pid"
          wait "$pid" 2>/dev/null || true

          sudo apt-get install -y "$deb"
          package="$(dpkg-deb -f "$deb" Package)"
          entry="$(dpkg -L "$package" | grep '/resources/server/index.cjs$' | head -1)"
          test -n "$entry"
          server_dir="$(dirname "$entry")"
          resources_dir="$(dirname "$server_dir")"
          app_root="$(dirname "$resources_dir")"
          node scripts/smoke_tauri_server_bundle.mjs "$app_root"

          exe="$(dpkg -L "$package" | grep -E '/(debridstreamer|yawf-stream)$' | head -1)"
          test -x "$exe"
          profile="$RUNNER_TEMP/deb-profile"
          mkdir -p "$profile/config" "$profile/data" "$profile/cache"
          setsid env \
            HOME="$profile" \
            XDG_CONFIG_HOME="$profile/config" \
            XDG_DATA_HOME="$profile/data" \
            XDG_CACHE_HOME="$profile/cache" \
            xvfb-run -a "$exe" >"$RUNNER_TEMP/deb-launch.log" 2>&1 &
          pid=$!
          sleep 10
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$RUNNER_TEMP/deb-launch.log"
            echo "Installed deb app exited during first launch" >&2
            exit 1
          fi
          kill -- -"$pid"
          wait "$pid" 2>/dev/null || true
          echo "ok   AppImage and deb launched with clean profiles and bundled libmpv"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: debridstreamer-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
