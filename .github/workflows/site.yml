name: site

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "web/public/icons/**"
      - "scripts/check_website_download_logic.mjs"
      - "scripts/check_website_static.mjs"
      - "scripts/check_website_path_mount.mjs"
      - "scripts/deploy_website_cloudflare.mjs"
      - "scripts/public_repo_preflight.mjs"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Public repo preflight
        run: node scripts/public_repo_preflight.mjs

      - name: Website download logic
        run: node scripts/check_website_download_logic.mjs

      - name: Website static QA
        run: node scripts/check_website_static.mjs

      - name: Website mounted-path QA
        run: node scripts/check_website_path_mount.mjs

      - name: Prepare site artifact
        run: |
          mkdir -p site
          cp -R website/. site/
          mkdir -p site/icons
          cp web/public/icons/icon-128.png site/icons/icon-128.png
          cp web/public/icons/icon-192.png site/icons/icon-192.png
          cp web/public/icons/icon-512.png site/icons/icon-512.png

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
