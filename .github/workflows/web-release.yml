# Release workflow for the DebridStreamer Tauri (web/) desktop app.
#
# Builds installable bundles for macOS, Linux and Windows, signs the updater
# artifacts, (on macOS) code-signs + notarizes with a Developer ID, and uploads
# everything to a DRAFT GitHub Release plus the `latest.json` the in-app updater
# reads.
#
# Trigger: push a tag matching `v*-web` (e.g. `v0.1.0-web`), or run manually
# (workflow_dispatch).
#
# ──────────────────────────────────────────────────────────────────────────
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions)
#
# Updater signing (REQUIRED for auto-update to work; the workflow fails early
# when the private key is missing instead of uploading update-rejected assets):
#   TAURI_SIGNING_PRIVATE_KEY            Contents of the minisign private key
#                                        generated by `tauri signer generate`
#                                        (the whole base64 blob, not a path).
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   Password for that key ("" if none).
#
# macOS code-signing + notarization (REQUIRED for a public mac release; the
# macOS job fails early when any required Developer ID/notarization secret is
# missing instead of producing a blocked unsigned download):
#   APPLE_CERTIFICATE          Base64 of the "Developer ID Application" .p12.
#                              (export from Keychain, then `base64 -i cert.p12`).
#   APPLE_CERTIFICATE_PASSWORD Password set when exporting that .p12.
#   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)".
#   APPLE_ID                   Apple ID email used for notarization.
#   APPLE_PASSWORD             App-specific password for that Apple ID
#                              (appleid.apple.com → Sign-In and Security).
#   APPLE_TEAM_ID              Your 10-char Apple Developer Team ID.
#
# NOTE: the only signing identity on the dev machine is an "Apple Development"
# cert, which CANNOT notarize. The user must create a "Developer ID Application"
# certificate in their Apple Developer account and supply the secrets above for
# a distributable, notarized macOS build. See web/PACKAGING.md.
# ──────────────────────────────────────────────────────────────────────────

name: web-release

on:
  push:
    tags:
      - "v*-web"
  workflow_dispatch:

# tauri-action creates/edits a release and uploads assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon + Intel from a single universal mac build.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Public repo preflight
        run: node scripts/public_repo_preflight.mjs

      - name: Release readiness
        run: node scripts/check_release_readiness.mjs

      - name: Website download logic
        run: node scripts/check_website_download_logic.mjs

      - name: Website static QA
        run: node scripts/check_website_static.mjs

      - name: Website mounted-path QA
        run: node scripts/check_website_path_mount.mjs

      - name: App responsive contract
        run: node scripts/check_app_responsive_contract.mjs

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY. Add the updater private key secret before creating public desktop releases."
            exit 1
          fi

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name. Add Developer ID signing and notarization secrets before creating public macOS releases."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both arches for the macOS universal build; no-op elsewhere.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> target"

      # Linux system deps for the Tauri (webkit2gtk) build.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Test frontend
        working-directory: web
        run: npm test

      - name: Test server
        working-directory: server
        run: npm test

      - name: Build server bundle
        working-directory: server
        run: npm run build

      - name: Build hosted PWA assets
        working-directory: web
        run: npm run build

      - name: Prepare desktop server resources
        run: node scripts/prepare_tauri_server_resources.mjs

      - name: Bundle Node runtime for macOS
        if: matrix.platform == 'macos-latest'
        run: node scripts/download_tauri_node_runtime.mjs darwin-arm64 darwin-x64

      - name: Bundle Node runtime for Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: node scripts/download_tauri_node_runtime.mjs linux-x64

      - name: Bundle Node runtime for Windows
        if: matrix.platform == 'windows-latest'
        run: node scripts/download_tauri_node_runtime.mjs win-x64

      - name: Smoke desktop server resources
        run: node scripts/smoke_tauri_server_bundle.mjs web/src-tauri/resources/server

      - name: Build, bundle, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (artifacts + latest.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (ignored on Linux/Windows).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: web
          # For a tag push, `__VERSION__` is replaced with the version from
          # tauri.conf.json; for workflow_dispatch the tag/release are still
          # created so the run produces a draft to inspect.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__-web' }}
          releaseName: "DebridStreamer v__VERSION__"
          releaseBody: "See the assets to download and install. This release was generated by CI."
          releaseDraft: true
          prerelease: false
          # `includeUpdaterJson` (default true) emits latest.json next to the
          # bundles for the in-app updater.
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      # tauri-action notarizes + staples the .app but NOT the .dmg container.
      # A signed-but-unnotarized, quarantined disk image makes modern macOS
      # refuse it with "…dmg is damaged and can't be opened. Move to Trash."
      # Notarize + staple the .dmg here, then replace the asset tauri-action
      # already uploaded to the draft release. (The .dmg is not referenced by
      # latest.json and has no updater .sig, so re-uploading it is self-contained.)
      - name: Notarize & staple the macOS DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dmg="$(find web/src-tauri/target -path '*/bundle/dmg/*.dmg' | head -1)"
          if [ -z "$dmg" ]; then echo "::error::no .dmg found to notarize"; exit 1; fi
          echo "Notarizing $dmg"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v$(node -p "require('./web/src-tauri/tauri.conf.json').version")-web"
          fi
          gh release upload "$tag" "$dmg" --clobber --repo "$GITHUB_REPOSITORY"
