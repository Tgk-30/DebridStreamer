# Release workflow for the DebridStreamer Tauri (web/) desktop app.
#
# Builds installable bundles for macOS, Linux and Windows, signs the updater
# artifacts, (on macOS) code-signs + notarizes with a Developer ID, and uploads
# everything to a DRAFT GitHub Release plus the `latest.json` the in-app updater
# reads.
#
# Trigger: push a tag matching `v*-web` (e.g. `v0.1.0-web`), or run manually
# (workflow_dispatch).
#
# ──────────────────────────────────────────────────────────────────────────
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions)
#
# Updater signing (REQUIRED for auto-update to work — without these the build
# still produces bundles, but `latest.json` is unsigned and clients reject it):
#   TAURI_SIGNING_PRIVATE_KEY            Contents of the minisign private key
#                                        generated by `tauri signer generate`
#                                        (the whole base64 blob, not a path).
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   Password for that key ("" if none).
#
# macOS code-signing + notarization (REQUIRED for a Gatekeeper-friendly mac
# release; omit them and the mac build is produced UNSIGNED / not notarized):
#   APPLE_CERTIFICATE          Base64 of the "Developer ID Application" .p12.
#                              (export from Keychain, then `base64 -i cert.p12`).
#   APPLE_CERTIFICATE_PASSWORD Password set when exporting that .p12.
#   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)".
#   APPLE_ID                   Apple ID email used for notarization.
#   APPLE_PASSWORD             App-specific password for that Apple ID
#                              (appleid.apple.com → Sign-In and Security).
#   APPLE_TEAM_ID              Your 10-char Apple Developer Team ID.
#
# NOTE: the only signing identity on the dev machine is an "Apple Development"
# cert, which CANNOT notarize. The user must create a "Developer ID Application"
# certificate in their Apple Developer account and supply the secrets above for
# a distributable, notarized macOS build. See web/PACKAGING.md.
# ──────────────────────────────────────────────────────────────────────────

name: web-release

on:
  push:
    tags:
      - "v*-web"
  workflow_dispatch:

# tauri-action creates/edits a release and uploads assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon + Intel from a single universal mac build.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both arches for the macOS universal build; no-op elsewhere.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> target"

      # Linux system deps for the Tauri (webkit2gtk) build.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build, bundle, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (artifacts + latest.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (ignored on Linux/Windows).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: web
          # For a tag push, `__VERSION__` is replaced with the version from
          # tauri.conf.json; for workflow_dispatch the tag/release are still
          # created so the run produces a draft to inspect.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__-web' }}
          releaseName: "DebridStreamer v__VERSION__"
          releaseBody: "See the assets to download and install. This release was generated by CI."
          releaseDraft: true
          prerelease: false
          # `includeUpdaterJson` (default true) emits latest.json next to the
          # bundles for the in-app updater.
          args: ${{ matrix.args }}
