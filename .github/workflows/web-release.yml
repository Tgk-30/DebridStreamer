# Release workflow for the DebridStreamer Tauri (web/) desktop app.
#
# Builds installable bundles for macOS (per-arch), Linux and Windows, signs the
# updater artifacts, (on macOS) bundles the libmpv runtime + code-signs +
# notarizes with a Developer ID, and uploads everything to a DRAFT GitHub Release
# plus the `latest.json` the in-app updater reads.
#
# Trigger: push a tag matching `v*-web` (e.g. `v0.5.0-web`), or run manually.
#
# ──────────────────────────────────────────────────────────────────────────
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions)
#
# Updater signing (REQUIRED for auto-update to work):
#   TAURI_SIGNING_PRIVATE_KEY            Minisign private key blob (base64).
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   Password for that key ("" if none).
#
# macOS code-signing + notarization (REQUIRED for a public mac release):
#   APPLE_CERTIFICATE          Base64 of the "Developer ID Application" .p12.
#   APPLE_CERTIFICATE_PASSWORD Password set when exporting that .p12.
#   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)".
#   APPLE_ID                   Apple ID email used for notarization.
#   APPLE_PASSWORD             App-specific password for that Apple ID.
#   APPLE_TEAM_ID              Your 10-char Apple Developer Team ID.
#
# macOS shipping is PER-ARCH (see web/src-tauri/DEPLOYMENT.md): arm64 builds on
# an Apple-Silicon runner and x86_64 on an Intel runner, each bundling its NATIVE
# Homebrew libmpv + full dependency tree (relocated to @rpath by
# scripts/bundle-mpv-deps.sh) so the in-window player works on a clean Mac.
# ──────────────────────────────────────────────────────────────────────────

name: web-release

on:
  push:
    tags:
      - "v*-web"
  workflow_dispatch:

# tauri-action creates/edits a release and uploads assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is built PER-ARCH on native runners so each bundles its own
          # architecture's libmpv (no lipo across two Homebrew installs). PIN the
          # runners (NOT `macos-latest` = macOS 26, whose SDK/codesign produces
          # "damaged" bundles): macos-15 = Apple Silicon, macos-15-intel = Intel
          # (macos-13 was retired by GitHub in Dec 2025 - it queues forever).
          # Both runners' Homebrew bottles carry minos 15.0; bundle-mpv-deps.sh's
          # vtool min-OS rewrite makes the bundles load on macOS 11+.
          - platform: macos-15
            os: macos
            rust_target: aarch64-apple-darwin
            node_runtime: darwin-arm64
            args: "--target aarch64-apple-darwin"
          - platform: macos-15-intel
            os: macos
            rust_target: x86_64-apple-darwin
            node_runtime: darwin-x64
            args: "--target x86_64-apple-darwin"
          # ubuntu-24.04 for libmpv.so.2 (mpv 0.37) - the 2.x client API the
          # libmpv2 crate needs. The .deb targets 24.04+ (system libmpv2); the
          # AppImage self-contains libmpv.so.2 so it runs on ANY distro (incl.
          # older ones), so there's no loss of reach. rpm is dropped (unvalidated
          # libmpv Requires); AppImage covers rpm distros.
          - platform: ubuntu-24.04
            os: linux
            args: "--bundles deb,appimage"
          - platform: windows-latest
            os: windows
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Public repo preflight
        run: node scripts/public_repo_preflight.mjs

      - name: Release readiness
        run: node scripts/check_release_readiness.mjs

      - name: Website download logic
        run: node scripts/check_website_download_logic.mjs

      - name: Website static QA
        run: node scripts/check_website_static.mjs

      - name: Website mounted-path QA
        run: node scripts/check_website_path_mount.mjs

      - name: App responsive contract
        run: node scripts/check_app_responsive_contract.mjs

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY. Add the updater private key secret before creating public desktop releases."
            exit 1
          fi

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name. Add Developer ID signing and notarization secrets before creating public macOS releases."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "web/src-tauri -> target"

      # Linux system deps for the Tauri (webkit2gtk) build + libmpv for the
      # in-window player (the shared core links libmpv on Linux now).
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libmpv-dev

      # Windows: MSVC env + libmpv import lib (from the DLL exports) + runtime DLL.
      # Mirrors .github/workflows/desktop-build.yml (validated there). libmpv-2.dll
      # is delay-loaded + preloaded from resources/lib at runtime (see build.rs +
      # render_player/core.rs ensure_libmpv_loaded).
      - name: Set up MSVC (lib.exe/dumpbin on PATH)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Provision libmpv (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $rel = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-dev-x86_64-2*.7z' } | Select-Object -First 1
          if (-not $asset) { throw "no mpv-dev-x86_64 asset in the latest release" }
          Write-Host "Fetching $($asset.name)"
          curl.exe -L -o mpv-dev.7z $asset.browser_download_url
          $dest = "$env:RUNNER_TEMP\mpv"
          7z x mpv-dev.7z -o"$dest" | Out-Null
          $dll = Get-ChildItem -Path $dest -Recurse -Include 'libmpv-2.dll','mpv-2.dll','libmpv-1.dll' | Select-Object -First 1
          if (-not $dll) { throw "libmpv-*.dll not found in mpv-dev archive" }
          $def = Get-ChildItem -Path $dest -Recurse -Filter '*.def' | Select-Object -First 1
          $defPath = if ($def) { $def.FullName } else { "$dest\mpv.def" }
          if (-not $def) {
            $exports = dumpbin /nologo /exports $dll.FullName
            $names = $exports |
              Select-String -Pattern '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)$' |
              ForEach-Object { $_.Matches[0].Groups[1].Value } |
              Where-Object { $_ -match '^[A-Za-z_][A-Za-z0-9_]*$' }
            if (-not $names) { throw "no exports parsed from $($dll.Name)" }
            @("LIBRARY libmpv-2", "EXPORTS") + $names | Set-Content -Encoding ascii $defPath
          }
          lib /def:"$defPath" /out:"$dest\mpv.lib" /machine:x64
          if (-not (Test-Path "$dest\mpv.lib")) { throw "lib.exe did not produce mpv.lib" }
          "MPV_LIB_DIR=$dest" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          New-Item -ItemType Directory -Force -Path web\src-tauri\lib | Out-Null
          Copy-Item $dll.FullName web\src-tauri\lib\libmpv-2.dll -Force

      # ── macOS: bundle the libmpv runtime for the in-window player ──────────
      # Import the Developer ID cert into a keychain first (so the relocated
      # dylibs can be signed here); pass p12 to tauri-action later is dropped in
      # favour of this single import. See web/src-tauri/DEPLOYMENT.md.
      - name: Import Developer ID certificate
        if: matrix.os == 'macos'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Bundle libmpv + deps (native arch) and sign them
        if: matrix.os == 'macos'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          brew install mpv jq
          FW="$PWD/web/src-tauri/Frameworks"
          rm -rf "$FW"
          web/src-tauri/scripts/bundle-mpv-deps.sh "$(brew --prefix)/lib/libmpv.2.dylib" "$FW"
          # Re-sign every bundled dylib with the Developer ID + hardened runtime +
          # secure timestamp so notarization accepts them (the script's ad-hoc
          # sigs are for local use only). Must run AFTER install_name_tool.
          find "$FW" -type f -name '*.dylib' -print0 | while IFS= read -r -d '' f; do
            codesign --force --timestamp --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$f"
          done
          # Link the app against the relocated libmpv (build.rs uses MPV_LIB_DIR),
          # so the binary references @rpath/libmpv.2.dylib, not the Homebrew path.
          echo "MPV_LIB_DIR=$FW" >> "$GITHUB_ENV"
          # Tell tauri-action to copy the real dylibs into Contents/Frameworks via
          # a --config override (list is dynamic; paths are relative to tauri.conf).
          jq -n --argjson fw \
            "$(cd web/src-tauri && find Frameworks -type f -name '*.dylib' | jq -R . | jq -s .)" \
            '{bundle:{macOS:{frameworks:$fw}}}' > "$RUNNER_TEMP/fw.conf.json"
          echo "FW_CONFIG_ARG=--config $RUNNER_TEMP/fw.conf.json" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Test frontend
        working-directory: web
        run: npm test

      - name: Test server
        working-directory: server
        run: npm test

      - name: Build server bundle
        working-directory: server
        run: npm run build

      - name: Build hosted PWA assets
        working-directory: web
        run: npm run build

      - name: Prepare desktop server resources
        run: node scripts/prepare_tauri_server_resources.mjs

      - name: Bundle Node runtime (macOS)
        if: matrix.os == 'macos'
        run: node scripts/download_tauri_node_runtime.mjs ${{ matrix.node_runtime }}

      - name: Bundle Node runtime for Linux
        if: matrix.os == 'linux'
        run: node scripts/download_tauri_node_runtime.mjs linux-x64

      - name: Bundle Node runtime for Windows
        if: matrix.os == 'windows'
        run: node scripts/download_tauri_node_runtime.mjs win-x64

      - name: Smoke desktop server resources
        run: node scripts/smoke_tauri_server_bundle.mjs web/src-tauri/resources/server

      - name: Build, bundle, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # libmpv link path (set by the bundle step on macOS; the mpv.lib dir on
          # Windows; unset on Linux where pkg-config finds it).
          MPV_LIB_DIR: ${{ env.MPV_LIB_DIR }}
          # Let appimagetool/linuxdeploy run without FUSE on ubuntu-24.04.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Updater signing (artifacts + latest.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing identity is already in the keychain (imported above), so
          # DON'T pass APPLE_CERTIFICATE here (that would re-import). Notarization
          # still needs the Apple ID creds. Ignored on Linux/Windows.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: web
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__-web' }}
          releaseName: "DebridStreamer v__VERSION__"
          releaseBody: "See the assets to download and install. This release was generated by CI."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }} ${{ env.FW_CONFIG_ARG }}

      # tauri-action notarizes + staples the .app but NOT the .dmg container.
      # Notarize + staple the .dmg here, then replace the asset tauri-action
      # already uploaded to the draft release.
      - name: Notarize & staple the macOS DMG
        if: matrix.os == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          dmg="$(find web/src-tauri/target -path '*/bundle/dmg/*.dmg' | head -1)"
          if [ -z "$dmg" ]; then echo "::error::no .dmg found to notarize"; exit 1; fi
          echo "Notarizing $dmg"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v$(node -p "require('./web/src-tauri/tauri.conf.json').version")-web"
          fi
          gh release upload "$tag" "$dmg" --clobber --repo "$GITHUB_REPOSITORY"
