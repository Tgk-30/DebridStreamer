services:
  debridstreamer:
    image: ghcr.io/tgk-30/yawf-stream:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 43110
      DS_SERVER_DATA_DIR: /data
      DS_SERVER_DB_PATH: /data/debridstreamer.sqlite
      DS_WEB_DIST: /app/web-dist
      DS_SERVER_COOKIE_SECURE: "true"
      DS_SERVER_TRUST_PROXY: "true"
      DS_SERVER_PUBLIC_MODE: "true"
      DS_SERVER_BIND_SESSION_USER_AGENT: "true"
    expose:
      - "43110"
    volumes:
      - debridstreamer-data:/data
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m,mode=1777

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - debridstreamer
    environment:
      YAWF_DOMAIN: ${YAWF_DOMAIN:?Set YAWF_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  debridstreamer-data:
  caddy-data:
  caddy-config:
