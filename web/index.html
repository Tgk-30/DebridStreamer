<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DebridStreamer" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Warm the TMDB image CDN connection early so posters/backdrops paint sooner. -->
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-128.png" />
    <title>DebridStreamer - Discover</title>
    <script src="/server-mode.js"></script>
    <script>
      // Apply the persisted theme synchronously BEFORE the bundle paints, to
      // avoid a flash of the default Aurora theme on load (FOUC). Mirrors
      // applyTheme: the default "aurora" removes the attribute; any other valid
      // theme id sets data-theme. Keep this in sync with theme/themes.ts.
      (function () {
        try {
          var VALID = ["aurora", "light", "midnight", "sunset"];
          var raw = localStorage.getItem("debridstreamer.settings.v1");
          if (!raw) return;
          var theme = JSON.parse(raw).theme;
          if (VALID.indexOf(theme) === -1) return; // unknown/empty → default
          if (theme === "aurora") {
            document.documentElement.removeAttribute("data-theme");
          } else {
            document.documentElement.setAttribute("data-theme", theme);
          }
        } catch (e) {
          // Ignore (private mode / malformed blob) → default theme.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
