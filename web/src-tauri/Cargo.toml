[package]
name = "debridstreamer"
version = "0.1.0"
description = "DebridStreamer — debrid streaming desktop app"
authors = ["tgk30"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "debridstreamer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
# Native HTTP client exposed to the webview. The JS side calls it via
# `@tauri-apps/plugin-http`'s `fetch` to bypass the browser CORS policy for
# arbitrary indexer / debrid / Stremio-addon hosts the user configures.
tauri-plugin-http = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
