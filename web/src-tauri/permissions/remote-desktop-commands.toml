[[permission]]
identifier = "remote-desktop-commands"
description = "Allows a configured follow-mode server to use non-secret desktop features."
commands.allow = [
  "open_in_external_player",
  "list_external_players",
  "detect_tunnel_tools",
  "reveal_in_file_manager",
  "app_install_info",
  "mpv_play",
  "mpv_pause",
  "mpv_resume",
  "mpv_seek",
  "mpv_get_position",
  "mpv_stop",
  "player_init",
  "player_load",
  "player_command",
  "player_set_property",
  "player_get_property",
  "player_set_video_margin",
  "player_set_rect",
  "player_destroy",
  "desktop_server_status",
  "desktop_server_start",
  "desktop_server_stop",
  "download_start",
  "download_pause",
  "download_resume",
  "download_cancel",
  "download_force_stop",
  "transcode_start",
  "transcode_cancel",
  "downloads_ffmpeg_available",
  "downloads_default_dir",
  "cast_discover",
  "cast_load",
  "cast_control",
  "cast_status",
  "cast_set_volume",
]
